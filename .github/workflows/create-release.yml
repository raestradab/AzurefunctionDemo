name: Create Release

on:
  workflow_run:
    workflows:
      - "CI - Build, Test & Sonar Analysis"
    branches:
      - master
    types:
      - completed

permissions:
  contents: write

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Show Version
        run: |
          echo "SemVer=${{ steps.gitversion.outputs.SemVer }}"
          echo "MajorMinorPatch=${{ steps.gitversion.outputs.MajorMinorPatch }}"
          echo "NuGetVersion=${{ steps.gitversion.outputs.NuGetVersion }}"
          echo "FullSemVer=${{ steps.gitversion.outputs.FullSemVer }}"

      - name: Restore
        run: dotnet restore AzurefunctionDemo.sln

      - name: Build
        run: dotnet build AzurefunctionDemo.sln --configuration Release --no-restore

      - name: Publish Azure Function
        run: |
          dotnet publish AzurefunctionDemo.csproj \
            --configuration Release \
            --no-build \
            --output publish

      - name: Create ZIP
        run: |
          cd publish
          zip -r ../AzureFunctionDemo-${{ steps.gitversion.outputs.SemVer }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzureFunction-${{ steps.gitversion.outputs.SemVer }}
          path: AzureFunctionDemo-${{ steps.gitversion.outputs.SemVer }}.zip

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          TAG="v${{ steps.gitversion.outputs.SemVer }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.SemVer }}
          name: Release v${{ steps.gitversion.outputs.SemVer }}
          generate_release_notes: true
          files: AzureFunctionDemo-${{ steps.gitversion.outputs.SemVer }}.zip
