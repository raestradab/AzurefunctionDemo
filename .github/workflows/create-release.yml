# Gated on "CI - Build, Test & Sonar Analysis" (ci.yml) finishing successfully on master,
# so a build with failing tests never produces a release artifact. Requires ci.yml to have
# a push-to-master trigger -- pull_request runs alone never complete "on master" and would
# never fire this workflow.

name: Create Release

on:
  workflow_run:
    workflows: ["CI - Build, Test & Sonar Analysis"]
    branches: [master]
    types:
      - completed

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore AzurefunctionDemo.sln

    - name: Build
      run: dotnet build AzurefunctionDemo.sln --configuration Release --no-restore

    - name: Publish Azure Function
      run: |
        dotnet publish AzurefunctionDemo.csproj \
        -c Release \
        -o publish

    - name: Create ZIP
      run: |
        cd publish
        zip -r ../Function.zip .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AzureFunction
        path: Function.zip
