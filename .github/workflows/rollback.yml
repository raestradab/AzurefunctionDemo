# Rolls a previously-published release back out to an environment. Lists existing
# Releases (job summary + log), validates the tag you pick actually exists, then
# redeploys that exact ZIP -- same no-rebuild path (and QA/PROD still require manual
# approval via their Environment protection rules) as a normal promotion.
#
# GitHub Actions workflow_dispatch inputs can't be populated dynamically, so there's no
# live dropdown of releases: the "list-releases" job prints them (summary + log) and the
# "tag" input is validated against that list, failing fast with a clear error if it
# doesn't exist.
#
# The three rollback-* jobs below duplicate deploy-dev/qa/prod.yml's download+deploy
# steps instead of calling those workflows via `uses:` -- chaining a workflow_call into
# a job that declares `environment:` left the environment's secrets empty
# ("app-name: should not be empty"), even though the called job also declared the same
# environment. Environment secrets only resolved reliably when the job itself (not a
# workflow_call chain into it) owns the `environment:` key, so each job here does that
# directly. See the same fix/note in package-release.yml.

name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to roll back"
        required: true
        type: choice
        options:
          - dev
          - QA
          - PROD
      tag:
        description: "Release tag to roll back to (e.g. v1.0.1) -- check the Releases page, or run this workflow once to see the list in the job summary."
        required: true
        type: string

permissions:
  contents: read

# Belt-and-suspenders alongside each deploy-*.yml's own concurrency group: don't let two
# rollback runs targeting the same environment race each other either.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  list-releases:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
    steps:
      - name: List existing releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Available releases"
            echo
            echo '```'
            gh release list --repo "${{ github.repository }}" --limit 50
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Validate selected tag exists
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release '$TAG' not found. See the list above or the Releases page."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  rollback-dev:
    needs: list-releases
    if: inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.list-releases.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "AzureFunctionDemo-*.zip" \
            --dir ./artifact \
            --clobber

      - name: Deploy to Azure Functions (dev)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./artifact/AzureFunctionDemo-${{ needs.list-releases.outputs.tag }}.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  rollback-qa:
    needs: list-releases
    if: inputs.environment == 'QA'
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.list-releases.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "AzureFunctionDemo-*.zip" \
            --dir ./artifact \
            --clobber

      - name: Deploy to Azure Functions (QA)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./artifact/AzureFunctionDemo-${{ needs.list-releases.outputs.tag }}.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  rollback-prod:
    needs: list-releases
    if: inputs.environment == 'PROD'
    runs-on: ubuntu-latest
    environment: PROD
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.list-releases.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "AzureFunctionDemo-*.zip" \
            --dir ./artifact \
            --clobber

      - name: Deploy to Azure Functions (Production)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./artifact/AzureFunctionDemo-${{ needs.list-releases.outputs.tag }}.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
