# Deploys a previously-built release ZIP to the Development Azure Function App. Never
# builds anything -- it downloads the exact asset package-release.yml attached to a
# GitHub Release and deploys that. Callable directly (workflow_dispatch) or from another
# workflow (workflow_call), e.g. a future auto-deploy-on-release pipeline.
#
# Uses GitHub Environment "dev" (the actual environment name configured in this repo --
# note this differs from the "Development" name used in the plan doc) for its
# AZURE_FUNCTIONAPP_NAME / AZURE_FUNCTIONAPP_PUBLISH_PROFILE secrets.

name: Deploy Development

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.0.1). Defaults to the latest release."
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.0.1). Defaults to the latest release."
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)
          fi
          echo "Deploying tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "AzureFunctionDemo-*.zip" \
            --dir ./artifact \
            --clobber

      - name: Deploy to Azure Functions (dev)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./artifact/AzureFunctionDemo-${{ steps.release.outputs.tag }}.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
