# Runs automatically on every push to master: opens/updates the release PR with the
# next computed version and CHANGELOG. Merging that PR is still the one human checkpoint
# (that's Release Please's design -- there's no way to skip reviewing the version/
# CHANGELOG before it's cut). The push created by merging that PR is what makes THIS
# workflow run again and actually notice the merge, cutting the tag + GitHub Release --
# which in turn triggers package-release.yml, which in turn auto-deploys to dev.
#
# workflow_dispatch (with an optional release-as override) is still available for
# forcing a specific version by hand when needed.

name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release-as:
        description: "Force this exact version (e.g. 1.2.0), overriding the version Release Please would auto-compute from commits. Leave empty for the normal auto-computed version."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # Uses a PAT (not the default GITHUB_TOKEN) because GitHub blocks events
      # triggered by GITHUB_TOKEN from starting other workflow runs. With the
      # default token, the Release PR never triggered ci.yml and the published
      # Release never triggered package-release.yml, so no release ever got a
      # deployable ZIP attached. See RELEASE_PLEASE_TOKEN setup in repo secrets.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release-as }}
