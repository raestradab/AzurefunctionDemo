# Builds and packages the Azure Function exactly once per release, then attaches the
# ZIP as an asset to the GitHub Release that Release Please already created. This is the
# only place the deployable artifact is produced -- deploy-dev/qa/prod.yml (Fases 5-7)
# download this same ZIP from the Release rather than rebuilding it, so the artifact that
# gets promoted through environments is always the exact bytes that were tested in CI.
#
# On a real `release: published` event, also auto-deploys to Development once packaging
# succeeds (deploy-dev job below, chained via `needs` so it can't run before the ZIP
# exists). QA and Production stay manual/approval-gated -- see deploy-qa.yml /
# deploy-prod.yml / rollback.yml.
#
# Also accepts workflow_dispatch (with an explicit tag) as a manual recovery path -- e.g.
# to backfill a ZIP for a release that was published before RELEASE_PLEASE_TOKEN was wired
# up, when release: published never fired this workflow in the first place. That manual
# path does not auto-deploy.

name: Package Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write # required to upload the ZIP as a release asset

env:
  DOTNET_VERSION: "9.0.x"

concurrency:
  group: package-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: release
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Checkout published tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AzurefunctionDemo.sln

      - name: Build
        run: dotnet build AzurefunctionDemo.sln --configuration Release --no-restore

      - name: Publish Azure Function
        run: |
          dotnet publish AzurefunctionDemo.csproj \
            --configuration Release \
            --no-build \
            --output publish

      - name: Create ZIP
        run: |
          cd publish
          zip -r "../AzureFunctionDemo-${{ steps.release.outputs.tag }}.zip" .

      - name: Attach ZIP to the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" \
            "AzureFunctionDemo-${{ steps.release.outputs.tag }}.zip" \
            --clobber

  deploy-dev:
    needs: package
    if: github.event_name == 'release'
    uses: ./.github/workflows/deploy-dev.yml
    with:
      tag: ${{ needs.package.outputs.tag }}
