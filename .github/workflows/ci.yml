# Continuous Integration: validates PR titles against Conventional Commits, builds the
# solution, runs the xUnit test suite with code coverage, and publishes the results to
# SonarCloud. This is the only workflow that runs on pull requests -- it never deploys,
# creates tags, or creates releases (that's release-please.yml / package-release.yml).
#
# Runs on every push to master and on pull requests targeting master. The push trigger
# is required so create-release.yml (which listens for this workflow via workflow_run)
# has a completed run on master to gate on -- a pull_request-only trigger never fires
# on master directly, so the release workflow would never start.
#
# Required repository configuration:
#   - Secret SONAR_TOKEN: a SonarCloud token (My Account > Security on sonarcloud.io).
#   - The project must exist in SonarCloud under organization "raestradab" with
#     project key "raestradab_AzurefunctionDemo" (adjust sonar.projectKey/sonar.organization
#     below if you used different values when creating the project on sonarcloud.io).

name: CI - Build, Test & Sonar Analysis

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  DOTNET_VERSION: "9.0.x"
  SONAR_PROJECT_KEY: "raestradab_AzurefunctionDemo"
  SONAR_ORGANIZATION: "raestradab"

jobs:
  # Enforces Conventional Commits on the PR title (squash-merge commit message),
  # which Release Please (release-please.yml) relies on to compute the next version.
  validate-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Validate PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            chore
            test
            ci
            build
            perf
            revert
            style

  build-test-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarCloud needs full history for accurate blame/analysis

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup JDK 17 (required by the SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Restore dependencies
        run: dotnet restore AzurefunctionDemo.sln

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"${{ env.SONAR_PROJECT_KEY }}" \
            /o:"${{ env.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Program.cs,**/AzurefunctionDemo.Tests/**"

      - name: Build
        run: dotnet build AzurefunctionDemo.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test AzurefunctionDemo.Tests/AzurefunctionDemo.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: AzurefunctionDemo.Tests/TestResults/**
